<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Recrutement - Centre Hospitalier de Liège</title>

<style>

:root{
--primary:#0066cc;
--secondary:#00aa66;
--bg:#081a24;
--grid:rgba(0,255,180,0.07);
}

*{
margin:0;
padding:0;
box-sizing:border-box;
}

body{
font-family:system-ui,sans-serif;
color:#e0f0ff;
min-height:100vh;
overflow-x:hidden;

background-image:url("https://i.pinimg.com/originals/89/e4/b6/89e4b6a49573b915b7f0d773fe1ef1de.gif");
background-size:cover;
background-position:center;
background-repeat:no-repeat;
background-attachment:fixed;
}

body::before{
content:"";
position:fixed;
inset:0;
background:rgba(5,20,30,0.75);
z-index:-1;
}

.ecg-grid{
position:fixed;
inset:0;

background-image:
linear-gradient(to bottom,transparent 0,transparent 19px,var(--grid) 19px,var(--grid) 20px),
linear-gradient(to right,transparent 0,transparent 19px,var(--grid) 19px,var(--grid) 20px);

background-size:20px 20px;
pointer-events:none;
z-index:-2;
}

header{
background:linear-gradient(135deg,#004080,#006699);
padding:60px 20px 40px;
text-align:center;
}

main{
max-width:1100px;
margin:40px auto;
padding:0 20px;
}

section{
background:rgba(10,30,40,0.65);
border-radius:16px;
padding:32px;
margin:32px 0;
}

h2{
color:#00ffcc;
margin-bottom:1.2em;
}

h3{
margin-top:20px;
color:#00ffaa;
}

form{
display:grid;
gap:16px;
}

input,textarea,select{
padding:14px;
border-radius:8px;
border:1px solid #004466;
background:rgba(255,255,255,0.05);
color:white;
}

button{
background:#00aa66;
color:white;
border:none;
padding:16px;
font-size:1.1rem;
border-radius:10px;
cursor:pointer;
}

button:hover{
background:#00cc88;
}

.hidden{
display:none;
}

footer{
text-align:center;
padding:40px 20px;
color:#88aacc;
}

</style>
</head>

<body>

<div class="ecg-grid"></div>

<header>
<h1>Recrutement CHL – Centre Hospitalier de Liège</h1>
<p>Rejoignez une équipe qui fait battre le cœur de la région</p>
</header>

<main>

<section>

<h2>Formulaire de candidature</h2>

<form>

<input type="text" placeholder="Discord (Ex : .stirox)" required>
<input type="text" placeholder="Nom" required>
<input type="text" placeholder="Prénom" required>
<input type="number" placeholder="Âge" required>
<input type="tel" placeholder="N° téléphone" required>

<label>Casier judiciaire</label>
<select required>
<option value="">Choisir</option>
<option>Vierge</option>
<option>Pas vierge</option>
</select>

<label>Expérience passée</label>
<select id="experiencePasse">
<option value="non">Non</option>
<option value="oui">Oui</option>
</select>

<div id="expDetails" class="hidden">

<textarea placeholder="Quel métier / grade / raison du changement / relation avec l'équipe"></textarea>

<textarea placeholder="Comment vous décririez-vous ?"></textarea>

<textarea placeholder="Quel est votre plus gros défaut ?"></textarea>

<label>Expérience médicale IRL</label>
<select id="experienceIRL">
<option value="">Choisir</option>
<option value="pratiquant">Pratiquant</option>
<option value="bonne">Bonne connaissance</option>
<option value="legere">Légère connaissance</option>
<option value="aucune">Aucune</option>
</select>

</div>

<div id="choixMetier" class="hidden">

<h3>Si Pratiquant</h3>

<label>Domaine</label>
<select id="metierMedical">
<option value="">Choisir</option>
<option value="medecin">Médecin</option>
<option value="infirmier">Infirmier</option>
<option value="kine">Kinésithérapeute</option>
</select>

</div>

<div id="medecinBox" class="hidden">

<h3>Questions Médecin</h3>

<input type="text" placeholder="Spécialisation">

<input type="text" placeholder="Hôpital où vous avez travaillé">

<textarea placeholder="Décrivez votre expérience médicale"></textarea>

</div>

<div id="infirmierBox" class="hidden">

<h3>Questions Infirmier</h3>

<input type="text" placeholder="Spécialisation infirmière">

<input type="text" placeholder="Hôpital où vous avez travaillé">

<textarea placeholder="Décrivez votre expérience"></textarea>

</div>

<div id="kineBox" class="hidden">

<h3>Questions Kinésithérapeute</h3>

<textarea placeholder="Décrivez votre expérience en kinésithérapie"></textarea>

</div>

<textarea placeholder="Quelles sont vos motivations pour rejoindre le CHL ?"></textarea>

<input type="text" placeholder="Quelle est votre citation préférée ?">

<label>Mot qui vous représente</label>
<select>
<option>Rapidité</option>
<option>Efficacité</option>
<option>Bonheur</option>
<option>Tolérance</option>
<option>Humanisme</option>
<option>Intransigeance</option>
<option>Sérieux</option>
<option>Rigolade</option>
</select>

<label>
<input type="checkbox" required>
Je prends en compte la formation afin d'intégrer le CHL
</label>

<button type="submit">Envoyer ma candidature</button>

</form>

</section>

</main>

<footer>
© 2026 – Centre Hospitalier de Liège – Tous droits réservés
</footer>

<script>

const experiencePasse = document.getElementById("experiencePasse");
const expDetails = document.getElementById("expDetails");

const experienceIRL = document.getElementById("experienceIRL");
const choixMetier = document.getElementById("choixMetier");

const metierMedical = document.getElementById("metierMedical");

const medecinBox = document.getElementById("medecinBox");
const infirmierBox = document.getElementById("infirmierBox");
const kineBox = document.getElementById("kineBox");

experiencePasse.addEventListener("change", () => {

if(experiencePasse.value === "oui"){
expDetails.classList.remove("hidden");
}else{
expDetails.classList.add("hidden");
choixMetier.classList.add("hidden");
}

});

experienceIRL.addEventListener("change", () => {

if(experienceIRL.value === "pratiquant"){
choixMetier.classList.remove("hidden");
}else{
choixMetier.classList.add("hidden");
medecinBox.classList.add("hidden");
infirmierBox.classList.add("hidden");
kineBox.classList.add("hidden");
}

});

metierMedical.addEventListener("change", () => {

medecinBox.classList.add("hidden");
infirmierBox.classList.add("hidden");
kineBox.classList.add("hidden");

if(metierMedical.value === "medecin"){
medecinBox.classList.remove("hidden");
}

if(metierMedical.value === "infirmier"){
infirmierBox.classList.remove("hidden");
}

if(metierMedical.value === "kine"){
kineBox.classList.remove("hidden");
}

});

</script>

</body>
</html>
