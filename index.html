<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Recrutement CHL</title>

<style>

:root{
--accent:#00ffaa;
}

*{
margin:0;
padding:0;
box-sizing:border-box;
}

body{
font-family:system-ui;
color:#e6f7ff;
min-height:100vh;

background-image:url("https://i.pinimg.com/originals/89/e4/b6/89e4b6a49573b915b7f0d773fe1ef1de.gif");
background-size:cover;
background-attachment:fixed;
}

body::before{
content:"";
position:fixed;
inset:0;
background:rgba(5,20,30,0.85);
z-index:-1;
}

header{
text-align:center;
padding:60px;
background:linear-gradient(135deg,#004080,#006699);
}

main{
max-width:1100px;
margin:auto;
padding:30px;
}

section{
background:rgba(10,30,40,0.8);
padding:35px;
border-radius:15px;
}

h2{
color:var(--accent);
margin-bottom:25px;
}

h3{
margin:25px 0 10px;
color:var(--accent);
}

/* STRUCTURE */

.form-section{
margin-bottom:30px;
}

.grid{
display:grid;
grid-template-columns:repeat(2,1fr);
gap:18px;
}

.full{
grid-column:1 / -1;
}

/* INPUT */

input,textarea,select{
width:100%;
padding:14px;
border-radius:8px;
border:1px solid #005577;
background:rgba(255,255,255,0.05);
color:white;
font-size:15px;
}

textarea{
resize:vertical;
min-height:90px;
}

/* BUTTON */

button{
padding:16px;
background:#00aa66;
border:none;
border-radius:10px;
font-size:16px;
color:white;
cursor:pointer;
}

button:hover{
background:#00cc88;
}

/* HIDDEN */

.hidden{
display:none;
}

footer{
text-align:center;
padding:40px;
color:#88aacc;
}

</style>
</head>

<body>

<header>
<h1>Recrutement – Centre Hospitalier de Liège</h1>
<p>Rejoignez une équipe qui fait battre le cœur de la région</p>
</header>

<main>

<section>

<h2>Formulaire de candidature</h2>

<form>

<!-- INFORMATIONS -->

<div class="form-section">

<div class="grid">

<input placeholder="Discord (Ex: .stirox)">
<input placeholder="Téléphone">

<input placeholder="Nom">
<input placeholder="Prénom">

<input type="number" placeholder="Âge">

<select>
<option>Casier judiciaire</option>
<option>Vierge</option>
<option>Pas vierge</option>
</select>

</div>

</div>

<!-- EXPERIENCE PASSEE -->

<div class="form-section">

<h3>Expérience passée</h3>

<select id="experiencePasse">
<option value="non">Non</option>
<option value="oui">Oui</option>
</select>

<div id="experienceDetails" class="hidden">

<textarea class="full" placeholder="Quel métier / grade / raison du changement / relation avec l'équipe"></textarea>

<textarea placeholder="Comment vous décririez-vous ?"></textarea>
<textarea placeholder="Quel est votre plus gros défaut ?"></textarea>

</div>

</div>

<!-- EXPERIENCE MEDICALE IRL -->

<div class="form-section">

<h3>Expérience médicale IRL</h3>

<select id="experienceMedicale">
<option value="aucune">Aucune</option>
<option value="legere">Légère connaissance</option>
<option value="bonne">Bonne connaissance</option>
<option value="pratiquant">Pratiquant</option>
</select>

</div>

<!-- PRATIQUANT -->

<div id="pratiquantSection" class="form-section hidden">

<h3>Domaine pratiqué</h3>

<select id="metierMedical">
<option value="">Choisir</option>
<option value="medecin">Médecin</option>
<option value="infirmier">Infirmier</option>
<option value="kine">Kinésithérapeute</option>
</select>

</div>

<!-- MEDECIN -->

<div id="medecinBox" class="form-section hidden">

<h3>Questions Médecin</h3>

<div class="grid">

<input placeholder="Spécialisation">
<input placeholder="Hôpital où vous avez travaillé">

<textarea class="full" placeholder="Décrivez votre expérience médicale"></textarea>

</div>

</div>

<!-- INFIRMIER -->

<div id="infirmierBox" class="form-section hidden">

<h3>Questions Infirmier</h3>

<div class="grid">

<input placeholder="Spécialisation infirmière">
<input placeholder="Hôpital où vous avez travaillé">

<textarea class="full" placeholder="Décrivez votre expérience"></textarea>

</div>

</div>

<!-- KINE -->

<div id="kineBox" class="form-section hidden">

<h3>Questions Kiné</h3>

<textarea placeholder="Décrivez votre expérience en kinésithérapie"></textarea>

</div>

<!-- MOTIVATION -->

<div class="form-section">

<textarea placeholder="Quelles sont vos motivations pour rejoindre le CHL ?"></textarea>

<input placeholder="Quelle est votre citation préférée ?">

<select>
<option>Mot qui vous représente</option>
<option>Rapidité</option>
<option>Efficacité</option>
<option>Bonheur</option>
<option>Tolérance</option>
<option>Humanisme</option>
<option>Intransigeance</option>
<option>Sérieux</option>
<option>Rigolade</option>
</select>

<label>
<input type="checkbox">
Je prends en compte la formation afin d'intégrer le CHL
</label>

</div>

<button type="submit">Envoyer ma candidature</button>

</form>

</section>

</main>

<footer>
© 2026 – Centre Hospitalier de Liège
</footer>

<script>

/* EXPERIENCE PASSEE */

const experiencePasse = document.getElementById("experiencePasse");
const experienceDetails = document.getElementById("experienceDetails");

experiencePasse.addEventListener("change",()=>{

if(experiencePasse.value==="oui"){
experienceDetails.classList.remove("hidden");
}else{
experienceDetails.classList.add("hidden");
}

});

/* EXPERIENCE MEDICALE */

const experienceMedicale = document.getElementById("experienceMedicale");
const pratiquantSection = document.getElementById("pratiquantSection");

experienceMedicale.addEventListener("change",()=>{

if(experienceMedicale.value==="pratiquant"){
pratiquantSection.classList.remove("hidden");
}else{
pratiquantSection.classList.add("hidden");
medecinBox.classList.add("hidden");
infirmierBox.classList.add("hidden");
kineBox.classList.add("hidden");
}

});

/* METIER */

const metierMedical = document.getElementById("metierMedical");

const medecinBox = document.getElementById("medecinBox");
const infirmierBox = document.getElementById("infirmierBox");
const kineBox = document.getElementById("kineBox");

metierMedical.addEventListener("change",()=>{

medecinBox.classList.add("hidden");
infirmierBox.classList.add("hidden");
kineBox.classList.add("hidden");

if(metierMedical.value==="medecin") medecinBox.classList.remove("hidden");
if(metierMedical.value==="infirmier") infirmierBox.classList.remove("hidden");
if(metierMedical.value==="kine") kineBox.classList.remove("hidden");

});

</script>

</body>
</html>
