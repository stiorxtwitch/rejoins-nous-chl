<meta property="og:description" content="Rejoignez une équipe médicale d'élite. Postulez au Centre Hospitalier de Liège.">

<style>
/* ══════════ RESET & ROOT ══════════ */
:root {
  --bg:       #04080f;
  --surface:  #07111a;
  --card:     rgba(8,22,35,0.92);
  --border:   rgba(0,180,120,0.18);
  --border2:  rgba(0,180,120,0.35);
  --accent:   #00e89a;
  --accent2:  #00b87a;
  --red:      #e84040;
  --text:     #cce8f4;
  --muted:    #567080;
  --gold:     #d4a843;
}
*, *::before, *::after { margin:0; padding:0; box-sizing:border-box; }

html { scroll-behavior: smooth; }

body {
  font-family: 'DM Sans', sans-serif;
  background: var(--bg);
  color: var(--text);
  min-height: 100vh;
  overflow-x: hidden;
}

/* ══════════ ECG BACKGROUND ══════════ */
.ecg-bg {
  position: fixed;
  inset: 0;
  z-index: 0;
  pointer-events: none;
  overflow: hidden;
}

.ecg-bg::before {
  content: '';
  position: absolute;
  inset: 0;
  background:
    radial-gradient(ellipse 60% 40% at 50% 0%, rgba(0,180,120,0.07) 0%, transparent 70%),
    radial-gradient(ellipse 40% 60% at 100% 100%, rgba(0,100,180,0.05) 0%, transparent 60%),
    linear-gradient(180deg, rgba(4,8,15,0) 0%, rgba(4,8,15,0.6) 100%);
}

/* Grid de fond */
.ecg-bg::after {
  content: '';
  position: absolute;
  inset: 0;
  background-image:
    linear-gradient(rgba(0,180,120,0.04) 1px, transparent 1px),
    linear-gradient(90deg, rgba(0,180,120,0.04) 1px, transparent 1px);
  background-size: 40px 40px;
}

/* Les lignes ECG SVG */
.ecg-lines {
  position: absolute;
  width: 100%;
  height: 100%;
}

.ecg-line {
  position: absolute;
  left: 0;
  width: 200%;
}
.ecg-line:nth-child(1) { top: 15%; opacity: 0.18; animation: ecg-scroll 8s linear infinite; }
.ecg-line:nth-child(2) { top: 40%; opacity: 0.12; animation: ecg-scroll 11s linear infinite 2s; }
.ecg-line:nth-child(3) { top: 65%; opacity: 0.10; animation: ecg-scroll 9s linear infinite 4s; }
.ecg-line:nth-child(4) { top: 85%; opacity: 0.08; animation: ecg-scroll 13s linear infinite 1s; }

@keyframes ecg-scroll {
  from { transform: translateX(0); }
  to   { transform: translateX(-50%); }
}

/* Pulse lumineux sur la ligne du haut */
.ecg-pulse {
  position: absolute;
  top: 15%;
  left: 0;
  width: 3px;
  height: 3px;
  border-radius: 50%;
  background: var(--accent);
  box-shadow: 0 0 10px 4px var(--accent);
  animation: ecg-pulse-move 8s linear infinite;
  opacity: 0.9;
}
@keyframes ecg-pulse-move {
  0%   { left: -2%; opacity: 0; }
  5%   { opacity: 1; }
  95%  { opacity: 1; }
  100% { left: 102%; opacity: 0; }
}

/* ══════════ LAYOUT ══════════ */
.page-wrapper {
  position: relative;
  z-index: 1;
  min-height: 100vh;
  display: flex;
  flex-direction: column;
}

/* ══════════ HEADER ══════════ */
header {
  text-align: center;
  padding: 70px 20px 60px;
  position: relative;
}

.header-badge {
  display: inline-flex;
  align-items: center;
  gap: 8px;
  font-family: 'Share Tech Mono', monospace;
  font-size: 11px;
  letter-spacing: 4px;
  color: var(--accent2);
  border: 1px solid var(--border2);
  padding: 6px 16px;
  border-radius: 2px;
  margin-bottom: 22px;
  text-transform: uppercase;
}
.header-badge::before {
  content: '';
  width: 6px; height: 6px;
  background: var(--accent);
  border-radius: 50%;
  animation: blink 1.4s ease-in-out infinite;
}
@keyframes blink { 0%,100%{opacity:1} 50%{opacity:0.2} }

header h1 {
  font-family: 'Bebas Neue', sans-serif;
  font-size: clamp(40px, 7vw, 80px);
  letter-spacing: 6px;
  line-height: 1;
  background: linear-gradient(135deg, #fff 20%, var(--accent) 80%);
  -webkit-background-clip: text;
  -webkit-text-fill-color: transparent;
  background-clip: text;
  margin-bottom: 14px;
}

header p {
  font-size: 16px;
  color: var(--muted);
  letter-spacing: 1px;
  font-weight: 300;
  font-style: italic;
}

.header-line {
  width: 80px;
  height: 1px;
  background: linear-gradient(90deg, transparent, var(--accent), transparent);
  margin: 24px auto 0;
}

/* ══════════ MAIN ══════════ */
main {
  flex: 1;
  max-width: 820px;
  width: 100%;
  margin: 0 auto;
  padding: 0 20px 60px;
}

/* ══════════ CARD ══════════ */
.card {
  background: var(--card);
  border: 1px solid var(--border);
  border-radius: 4px;
  padding: 44px 48px;
  position: relative;
  backdrop-filter: blur(12px);
  box-shadow:
    0 0 0 1px rgba(0,232,154,0.03),
    0 20px 60px rgba(0,0,0,0.5),
    inset 0 1px 0 rgba(255,255,255,0.04);
}
.card::before {
  content: '';
  position: absolute;
  top: 0; left: 0; right: 0;
  height: 2px;
  background: linear-gradient(90deg, transparent, var(--accent), transparent);
  border-radius: 4px 4px 0 0;
}

/* ══════════ SECTION TITLES ══════════ */
.section-title {
  font-family: 'Bebas Neue', sans-serif;
  font-size: 22px;
  letter-spacing: 4px;
  color: var(--accent);
  margin: 36px 0 20px;
  display: flex;
  align-items: center;
  gap: 12px;
}
.section-title::before { content: '//'; color: var(--muted); font-family: 'Share Tech Mono',monospace; font-size: 14px; }
.section-title:first-of-type { margin-top: 0; }

/* ══════════ GRID ══════════ */
.grid {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 14px;
}
.full { grid-column: 1 / -1; }

@media(max-width: 600px) {
  .grid { grid-template-columns: 1fr; }
  .full { grid-column: 1; }
  .card { padding: 28px 20px; }
}

/* ══════════ LABELS ══════════ */
.field-group {
  display: flex;
  flex-direction: column;
  gap: 6px;
}
.field-label {
  font-family: 'Share Tech Mono', monospace;
  font-size: 10px;
  letter-spacing: 2px;
  color: var(--muted);
  text-transform: uppercase;
}

/* ══════════ INPUTS ══════════ */
input, textarea, select {
  width: 100%;
  padding: 13px 16px;
  background: rgba(255,255,255,0.04);
  border: 1px solid var(--border);
  border-radius: 3px;
  color: var(--text);
  font-family: 'DM Sans', sans-serif;
  font-size: 14px;
  outline: none;
  transition: border-color 0.2s, background 0.2s, box-shadow 0.2s;
  -webkit-appearance: none;
}
input::placeholder, textarea::placeholder { color: var(--muted); font-size: 13px; }
input:focus, textarea:focus, select:focus {
  border-color: var(--accent2);
  background: rgba(0,232,154,0.04);
  box-shadow: 0 0 0 3px rgba(0,232,154,0.08);
}
input:hover:not(:focus), textarea:hover:not(:focus), select:hover:not(:focus) {
  border-color: rgba(0,180,120,0.3);
}

select { cursor: pointer; }
select option { background: #0a1a26; color: var(--text); }

textarea {
  resize: vertical;
  min-height: 90px;
  line-height: 1.6;
}

/* ══════════ HIDDEN ══════════ */
.hidden {
  display: none !important;
}

/* ══════════ SEPARATOR ══════════ */
.sep {
  height: 1px;
  background: linear-gradient(90deg, transparent, var(--border2), transparent);
  margin: 32px 0;
}

/* ══════════ SUBMIT BUTTON ══════════ */
.btn-submit {
  width: 100%;
  padding: 17px;
  margin-top: 32px;
  background: linear-gradient(135deg, var(--accent2), var(--accent));
  border: none;
  border-radius: 3px;
  font-family: 'Bebas Neue', sans-serif;
  font-size: 22px;
  letter-spacing: 5px;
  color: #000;
  cursor: pointer;
  position: relative;
  overflow: hidden;
  transition: all 0.3s;
}
.btn-submit::before {
  content: '';
  position: absolute;
  inset: 0;
  background: linear-gradient(90deg, transparent, rgba(255,255,255,0.15), transparent);
  transform: translateX(-100%);
  transition: transform 0.5s;
}
.btn-submit:hover {
  transform: translateY(-2px);
  box-shadow: 0 8px 30px rgba(0,232,154,0.3);
}
.btn-submit:hover::before { transform: translateX(100%); }
.btn-submit:active { transform: translateY(0); }
.btn-submit:disabled { opacity: 0.5; cursor: not-allowed; transform: none; }

/* ══════════ STATUS MESSAGES ══════════ */
.status {
  margin-top: 20px;
  padding: 14px 18px;
  border-radius: 3px;
  font-family: 'Share Tech Mono', monospace;
  font-size: 12px;
  letter-spacing: 2px;
  display: none;
  animation: fadeIn 0.3s ease;
}
@keyframes fadeIn { from{opacity:0;transform:translateY(6px)} to{opacity:1;transform:translateY(0)} }
.status.success {
  display: block;
  background: rgba(0,232,154,0.1);
  border: 1px solid rgba(0,232,154,0.35);
  color: var(--accent);
}
.status.error {
  display: block;
  background: rgba(232,64,64,0.1);
  border: 1px solid rgba(232,64,64,0.35);
  color: var(--red);
}

/* ══════════ LOADING DOTS ══════════ */
.dots span {
  display: inline-block;
  width: 6px; height: 6px;
  background: #000;
  border-radius: 50%;
  margin: 0 2px;
  animation: dot 1.2s ease-in-out infinite;
}
.dots span:nth-child(2) { animation-delay: 0.2s; }
.dots span:nth-child(3) { animation-delay: 0.4s; }
@keyframes dot { 0%,80%,100%{transform:scale(0.5);opacity:0.4} 40%{transform:scale(1);opacity:1} }

/* ══════════ FOOTER ══════════ */
footer {
  text-align: center;
  padding: 30px;
  font-family: 'Share Tech Mono', monospace;
  font-size: 10px;
  letter-spacing: 3px;
  color: var(--muted);
  opacity: 0.5;
  position: relative;
  z-index: 1;
}

/* ══════════ MONITOR BAR ══════════ */
.monitor-bar {
  position: fixed;
  top: 0; left: 0; right: 0;
  height: 2px;
  background: linear-gradient(90deg, transparent, var(--accent), transparent);
  z-index: 100;
  animation: scan 3s ease-in-out infinite;
}
@keyframes scan { 0%,100%{opacity:0.4} 50%{opacity:1} }

/* Corner decoration */
.corner-tag {
  position: fixed;
  top: 14px; right: 20px;
  font-family: 'Share Tech Mono', monospace;
  font-size: 10px;
  letter-spacing: 3px;
  color: var(--accent2);
  opacity: 0.5;
  z-index: 100;
}
</style>
</head>

<!-- Page -->
<div class="page-wrapper">

  <header>
    <div class="header-badge">Recrutement en cours</div>
    <h1>Centre Hospitalier<br>de Liège</h1>
    <p>Rejoignez une équipe qui fait battre le cœur de la région</p>
    <div class="header-line"></div>
  </header>

  <main>
    <div class="card">

      <div class="section-title">Identité</div>
      <div class="grid">
        <div class="field-group">
          <label class="field-label">Pseudo Discord *</label>
          <input id="discord" placeholder="Ex : .stirox" required>
        </div>
        <div class="field-group">
          <label class="field-label">Téléphone</label>
          <input id="telephone" placeholder="+32 XXX XX XX XX">
        </div>
        <div class="field-group">
          <label class="field-label">Nom *</label>
          <input id="nom" placeholder="Nom de famille" required>
        </div>
        <div class="field-group">
          <label class="field-label">Prénom *</label>
          <input id="prenom" placeholder="Prénom" required>
        </div>
        <div class="field-group">
          <label class="field-label">Âge *</label>
          <input id="age" type="number" min="16" max="80" placeholder="Votre âge" required>
        </div>
        <div class="field-group">
          <label class="field-label">Casier judiciaire *</label>
          <select id="casier">
            <option value="Vierge">Vierge</option>
            <option value="Pas vierge">Pas vierge</option>
          </select>
        </div>
      </div>

      <div class="sep"></div>

      <!-- EXPÉRIENCE PASSÉE -->
      <div class="section-title">Expérience passée</div>
      <div class="field-group">
        <label class="field-label">Avez-vous déjà exercé un métier similaire ?</label>
        <select id="experiencePasse">
          <option value="non">Non</option>
          <option value="oui">Oui</option>
        </select>
      </div>

      <div id="experienceBox" class="hidden" style="margin-top:14px">
        <div class="grid">
          <div class="field-group">
            <label class="field-label">Métier exercé</label>
            <input id="ancienMetier" placeholder="Ex : Médecin urgentiste">
          </div>
          <div class="field-group">
            <label class="field-label">Grade / Poste</label>
            <input id="ancienGrade" placeholder="Ex : Chef de service">
          </div>
          <div class="field-group full">
            <label class="field-label">Raison du changement</label>
            <textarea id="raisonChgt" placeholder="Pourquoi avez-vous quitté ce poste ?"></textarea>
          </div>
          <div class="field-group full">
            <label class="field-label">Relation inter-équipe</label>
            <textarea id="interEquipe" placeholder="Comment décrieriez-vous votre relation avec vos anciens collègues ?"></textarea>
          </div>
        </div>
      </div>

      <div class="sep"></div>

      <!-- PERSONNALITÉ -->
      <div class="section-title">Personnalité</div>
      <div class="grid">
        <div class="field-group">
          <label class="field-label">Comment vous décririez-vous ?</label>
          <textarea id="description" placeholder="Décrivez votre personnalité en quelques lignes..."></textarea>
        </div>
        <div class="field-group">
          <label class="field-label">Votre plus gros défaut</label>
          <textarea id="defaut" placeholder="Soyez honnête, c'est valorisé."></textarea>
        </div>
      </div>

      <div class="sep"></div>

      <!-- EXPÉRIENCE MÉDICALE IRL -->
      <div class="section-title">Expérience médicale IRL</div>
      <div class="field-group">
        <label class="field-label">Niveau d'expérience</label>
        <select id="experienceMedicale">
          <option value="aucune">Aucune</option>
          <option value="legere">Légère connaissance</option>
          <option value="bonne">Bonne connaissance</option>
          <option value="pratiquant">Pratiquant(e)</option>
        </select>
      </div>

      <!-- SOUS-SECTION PRATIQUANT -->
      <div id="pratiquantSection" class="hidden" style="margin-top:14px">
        <div class="field-group" style="margin-bottom:14px">
          <label class="field-label">Domaine pratiqué</label>
          <select id="metierMedical">
            <option value="">— Choisir —</option>
            <option value="medecin">Médecin</option>
            <option value="infirmier">Infirmier(e)</option>
            <option value="kine">Kinésithérapeute</option>
          </select>
        </div>

        <!-- MÉDECIN -->
        <div id="medecinBox" class="hidden">
          <div class="grid">
            <div class="field-group">
              <label class="field-label">Spécialisation</label>
              <input id="specialisationMed" placeholder="Ex : Cardiologie, Urgences...">
            </div>
            <div class="field-group">
              <label class="field-label">Hôpital / Établissement</label>
              <input id="hopitalMed" placeholder="Nom de l'établissement">
            </div>
            <div class="field-group full">
              <label class="field-label">Détail de l'expérience</label>
              <textarea id="expDetailMed" placeholder="Décrivez votre expérience médicale..."></textarea>
            </div>
          </div>
        </div>

        <!-- INFIRMIER -->
        <div id="infirmierBox" class="hidden">
          <div class="grid">
            <div class="field-group">
              <label class="field-label">Spécialisation infirmière</label>
              <input id="specialisationInf" placeholder="Ex : Soins intensifs, Pédiatrie...">
            </div>
            <div class="field-group">
              <label class="field-label">Hôpital / Établissement</label>
              <input id="hopitalInf" placeholder="Nom de l'établissement">
            </div>
            <div class="field-group full">
              <label class="field-label">Détail de l'expérience</label>
              <textarea id="expDetailInf" placeholder="Décrivez votre expérience..."></textarea>
            </div>
          </div>
        </div>

        <!-- KINÉ -->
        <div id="kineBox" class="hidden">
          <div class="field-group">
            <label class="field-label">Détail de l'expérience en kinésithérapie</label>
            <textarea id="expDetailKine" placeholder="Décrivez votre expérience..."></textarea>
          </div>
        </div>
      </div>

      <div class="sep"></div>

      <!-- MOTIVATION -->
      <div class="section-title">Motivation</div>
      <div class="field-group" style="margin-bottom:14px">
        <label class="field-label">Pourquoi rejoindre le CHL ? *</label>
        <textarea id="motivation" placeholder="Exprimez vos motivations sincères..." style="min-height:110px" required></textarea>
      </div>
      <div class="grid">
        <div class="field-group">
          <label class="field-label">Votre citation préférée</label>
          <input id="citation" placeholder="Une citation qui vous inspire">
        </div>
        <div class="field-group">
          <label class="field-label">Mot qui vous représente</label>
          <select id="mot">
            <option value="Rapidité">Rapidité</option>
            <option value="Efficacité">Efficacité</option>
            <option value="Bonheur">Bonheur</option>
            <option value="Tolérance">Tolérance</option>
            <option value="Humanisme">Humanisme</option>
            <option value="Intransigeance">Intransigeance</option>
            <option value="Sérieux">Sérieux</option>
            <option value="Rigolade">Rigolade</option>
          </select>
        </div>
        <div class="field-group full">
          <label class="field-label">Acceptez-vous de suivre la formation pour intégrer le CHL ? *</label>
          <select id="formation" required>
            <option value="">— Choisir —</option>
            <option value="Oui">Oui</option>
            <option value="Non">Non</option>
          </select>
        </div>
      </div>

      <!-- SUBMIT -->
      <button class="btn-submit" id="submitBtn" onclick="submitForm()">
        ENVOYER MA CANDIDATURE
      </button>

      <div class="status" id="statusMsg"></div>

    </div>
  </main>

  <footer>© 2026 — CENTRE HOSPITALIER DE LIÈGE // CONFIDENTIEL</footer>
</div>

<script>
  // ══ URL de votre bot Render ══
  const BOT_URL = "https://chl-bot-gestion.onrender.com";

  // ══ Logique des sélecteurs conditionnels ══

  document.getElementById("experiencePasse").addEventListener("change", function() {
    document.getElementById("experienceBox").classList.toggle("hidden", this.value !== "oui");
  });

  document.getElementById("experienceMedicale").addEventListener("change", function() {
    const show = this.value === "pratiquant";
    document.getElementById("pratiquantSection").classList.toggle("hidden", !show);
    if (!show) {
      ["medecinBox","infirmierBox","kineBox"].forEach(id => document.getElementById(id).classList.add("hidden"));
    }
  });

  document.getElementById("metierMedical").addEventListener("change", function() {
    ["medecinBox","infirmierBox","kineBox"].forEach(id => document.getElementById(id).classList.add("hidden"));
    const map = { medecin:"medecinBox", infirmier:"infirmierBox", kine:"kineBox" };
    if (map[this.value]) document.getElementById(map[this.value]).classList.remove("hidden");
  });

  // ══ Soumission du formulaire ══
  async function submitForm() {
    const btn    = document.getElementById("submitBtn");
    const status = document.getElementById("statusMsg");

    // Validation basique
    const discord    = document.getElementById("discord").value.trim();
    const nom        = document.getElementById("nom").value.trim();
    const prenom     = document.getElementById("prenom").value.trim();
    const motivation = document.getElementById("motivation").value.trim();
    const formation  = document.getElementById("formation").value;

    if (!discord || !nom || !prenom || !motivation || !formation) {
      status.textContent = "⚠ Veuillez remplir tous les champs obligatoires (*).";
      status.className = "status error";
      return;
    }

    // Récupérer l'expérience médicale selon le métier
    const metier          = document.getElementById("metierMedical").value;
    const expMedicale     = document.getElementById("experienceMedicale").value;
    let specialisation    = "";
    let hopital           = "";
    let expDetail         = "";

    if (metier === "medecin") {
      specialisation = document.getElementById("specialisationMed").value.trim();
      hopital        = document.getElementById("hopitalMed").value.trim();
      expDetail      = document.getElementById("expDetailMed").value.trim();
    } else if (metier === "infirmier") {
      specialisation = document.getElementById("specialisationInf").value.trim();
      hopital        = document.getElementById("hopitalInf").value.trim();
      expDetail      = document.getElementById("expDetailInf").value.trim();
    } else if (metier === "kine") {
      expDetail      = document.getElementById("expDetailKine").value.trim();
    }

    // Construire le payload
    const payload = {
      discord,
      telephone      : document.getElementById("telephone").value.trim(),
      nom,
      prenom,
      age            : document.getElementById("age").value,
      casier         : document.getElementById("casier").value,
      experiencePasse: document.getElementById("experiencePasse").value,
      ancienMetier   : document.getElementById("ancienMetier")?.value.trim() || "",
      ancienGrade    : document.getElementById("ancienGrade")?.value.trim()  || "",
      raisonChgt     : document.getElementById("raisonChgt")?.value.trim()   || "",
      interEquipe    : document.getElementById("interEquipe")?.value.trim()  || "",
      description    : document.getElementById("description").value.trim(),
      defaut         : document.getElementById("defaut").value.trim(),
      expMedicale,
      metierMedical  : metier,
      specialisation,
      hopital,
      expDetail,
      motivation,
      citation       : document.getElementById("citation").value.trim(),
      mot            : document.getElementById("mot").value,
      formation,
    };

    // UI loading
    btn.disabled = true;
    btn.innerHTML = 'ENVOI EN COURS <span class="dots"><span></span><span></span><span></span></span>';
    status.className = "status";

    try {
      const res  = await fetch(`${BOT_URL}/api/candidature`, {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify(payload),
      });
      const data = await res.json();

      if (data.success) {
        status.textContent = `✅ Candidature envoyée ! Un salon Discord a été créé : #${data.channelName}. Notre équipe vous contactera bientôt.`;
        status.className = "status success";
        btn.textContent  = "✓ CANDIDATURE ENVOYÉE";
        btn.style.background = "linear-gradient(135deg, #1a5c3a, #27ae60)";
        btn.style.color = "white";
      } else {
        throw new Error(data.error || "Erreur inconnue");
      }
    } catch (err) {
      status.textContent = `❌ Erreur : ${err.message}. Vérifiez que votre pseudo Discord est correct.`;
      status.className = "status error";
      btn.disabled = false;
      btn.textContent = "ENVOYER MA CANDIDATURE";
    }
  }
</script>

</body>
</html>
