<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Recrutement CHL</title>

<style>

:root{
--primary:#0066cc;
--secondary:#00ffaa;
--grid:rgba(0,255,180,0.07);
}

*{
margin:0;
padding:0;
box-sizing:border-box;
}

body{
font-family:system-ui;
color:#e0f0ff;
min-height:100vh;

background-image:url("https://i.pinimg.com/originals/89/e4/b6/89e4b6a49573b915b7f0d773fe1ef1de.gif");
background-size:cover;
background-position:center;
background-attachment:fixed;
}

body::before{
content:"";
position:fixed;
inset:0;
background:rgba(5,20,30,0.8);
z-index:-1;
}

header{
text-align:center;
padding:60px 20px;
background:linear-gradient(135deg,#004080,#006699);
}

main{
max-width:1100px;
margin:auto;
padding:30px;
}

section{
background:rgba(10,30,40,0.75);
padding:35px;
border-radius:14px;
}

h2{
color:#00ffcc;
margin-bottom:25px;
}

h3{
color:#00ffaa;
margin-top:25px;
margin-bottom:10px;
}

form{
display:flex;
flex-direction:column;
gap:20px;
}

/* GRILLE FORMULAIRE */

.form-grid{
display:grid;
grid-template-columns:repeat(2,1fr);
gap:18px;
}

.full{
grid-column:1/-1;
}

/* INPUT */

input,textarea,select{
width:100%;
padding:14px;
border-radius:8px;
border:1px solid #005577;
background:rgba(255,255,255,0.05);
color:white;
font-size:15px;
}

textarea{
resize:vertical;
min-height:80px;
}

label{
font-size:14px;
opacity:0.8;
}

/* BOUTON */

button{
padding:16px;
background:#00aa66;
border:none;
border-radius:10px;
font-size:16px;
color:white;
cursor:pointer;
transition:0.2s;
}

button:hover{
background:#00cc88;
transform:translateY(-2px);
}

/* SECTIONS CACHÉES */

.hidden{
display:none;
}

footer{
text-align:center;
padding:40px;
color:#88aacc;
}

</style>
</head>

<body>

<header>

<h1>Recrutement – Centre Hospitalier de Liège</h1>
<p>Rejoignez une équipe qui fait battre le cœur de la région</p>

</header>

<main>

<section>

<h2>Formulaire de candidature</h2>

<form>

<div class="form-grid">

<input type="text" placeholder="Discord (Ex : .stirox)">
<input type="tel" placeholder="Téléphone">

<input type="text" placeholder="Nom">
<input type="text" placeholder="Prénom">

<input type="number" placeholder="Âge">

<select>
<option>Casier judiciaire</option>
<option>Vierge</option>
<option>Pas vierge</option>
</select>

<select id="experiencePasse">
<option value="non">Expérience passée : Non</option>
<option value="oui">Expérience passée : Oui</option>
</select>

</div>

<div id="expDetails" class="hidden">

<div class="form-grid">

<textarea class="full" placeholder="Quel métier / grade / raison du changement / relation avec l'équipe"></textarea>

<textarea placeholder="Comment vous décririez-vous ?"></textarea>
<textarea placeholder="Quel est votre plus gros défaut ?"></textarea>

<select id="experienceIRL" class="full">
<option value="">Expérience médicale IRL</option>
<option value="pratiquant">Pratiquant</option>
<option value="bonne">Bonne connaissance</option>
<option value="legere">Légère connaissance</option>
<option value="aucune">Aucune</option>
</select>

</div>

</div>

<div id="choixMetier" class="hidden">

<h3>Si Pratiquant</h3>

<select id="metierMedical">
<option value="">Choisir le domaine</option>
<option value="medecin">Médecin</option>
<option value="infirmier">Infirmier</option>
<option value="kine">Kinésithérapeute</option>
</select>

</div>

<div id="medecinBox" class="hidden">

<h3>Questions Médecin</h3>

<div class="form-grid">

<input placeholder="Spécialisation">
<input placeholder="Hôpital où vous avez travaillé">

<textarea class="full" placeholder="Décrivez votre expérience médicale"></textarea>

</div>

</div>

<div id="infirmierBox" class="hidden">

<h3>Questions Infirmier</h3>

<div class="form-grid">

<input placeholder="Spécialisation infirmière">
<input placeholder="Hôpital où vous avez travaillé">

<textarea class="full" placeholder="Décrivez votre expérience"></textarea>

</div>

</div>

<div id="kineBox" class="hidden">

<h3>Questions Kiné</h3>

<textarea placeholder="Décrivez votre expérience en kinésithérapie"></textarea>

</div>

<textarea class="full" placeholder="Quelles sont vos motivations pour rejoindre le CHL ?"></textarea>

<input placeholder="Quelle est votre citation préférée ?">

<select>
<option>Mot qui vous représente</option>
<option>Rapidité</option>
<option>Efficacité</option>
<option>Bonheur</option>
<option>Tolérance</option>
<option>Humanisme</option>
<option>Intransigeance</option>
<option>Sérieux</option>
<option>Rigolade</option>
</select>

<label>
<input type="checkbox"> Je prends en compte la formation pour intégrer le CHL
</label>

<button type="submit">Envoyer ma candidature</button>

</form>

</section>

</main>

<footer>
© 2026 – Centre Hospitalier de Liège
</footer>

<script>

const experiencePasse = document.getElementById("experiencePasse");
const expDetails = document.getElementById("expDetails");

const experienceIRL = document.getElementById("experienceIRL");
const choixMetier = document.getElementById("choixMetier");

const metierMedical = document.getElementById("metierMedical");

const medecinBox = document.getElementById("medecinBox");
const infirmierBox = document.getElementById("infirmierBox");
const kineBox = document.getElementById("kineBox");

experiencePasse.addEventListener("change",()=>{

if(experiencePasse.value==="oui"){
expDetails.classList.remove("hidden");
}else{
expDetails.classList.add("hidden");
choixMetier.classList.add("hidden");
}

});

document.addEventListener("change",(e)=>{

if(e.target.id==="experienceIRL"){

if(e.target.value==="pratiquant"){
choixMetier.classList.remove("hidden");
}else{
choixMetier.classList.add("hidden");
medecinBox.classList.add("hidden");
infirmierBox.classList.add("hidden");
kineBox.classList.add("hidden");
}

}

});

document.addEventListener("change",(e)=>{

if(e.target.id==="metierMedical"){

medecinBox.classList.add("hidden");
infirmierBox.classList.add("hidden");
kineBox.classList.add("hidden");

if(e.target.value==="medecin") medecinBox.classList.remove("hidden");
if(e.target.value==="infirmier") infirmierBox.classList.remove("hidden");
if(e.target.value==="kine") kineBox.classList.remove("hidden");

}

});

</script>

</body>
</html>
